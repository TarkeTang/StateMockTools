<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 实时会话系统</title>
    <link rel="stylesheet" href="static/css/common.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px;
            text-align: center;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #3B82F6;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
        }
        
        .error-message {
            font-size: 24px;
            color: #E2E8F0;
            margin-bottom: 16px;
        }
        
        .error-description {
            font-size: 16px;
            color: #94A3B8;
            margin-bottom: 32px;
            max-width: 500px;
        }
        
        .back-home {
            padding: 10px 24px;
            background-color: #3B82F6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-home:hover {
            background-color: #2563EB;
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧菜单栏 -->
        <div class="sidebar">
            <ul>
                <li><span>💬</span><span>会话中心</span></li>
                <li><span>📱</span><span>设备管理</span></li>
                <li><span>🔗</span><span>会话管理</span></li>
                <li><span>📋</span><span>协议管理</span></li>
                <li><span>🤖</span><span>自动化测试</span></li>
                <li><span>⚙️</span><span>系统设置</span></li>
            </ul>
        </div>
        
        <!-- 右侧内容区域 -->
        <div class="content-panel">
            <div class="content-header">
                <h3>页面未找到</h3>
            </div>
            
            <div class="error-container">
                <div class="error-code">404</div>
                <div class="error-message">页面不存在</div>
                <div class="error-description">
                    您访问的页面不存在或已被移除。
                    请检查URL是否正确，或返回首页重新导航。
                </div>
                <button class="back-home" onclick="window.location.href='/'">返回首页</button>
            </div>
        </div>
    </div>

    <script src="static/js/common.js"></script>
</body>
</html>
