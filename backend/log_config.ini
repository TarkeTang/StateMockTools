[DEFAULT]

[formatters]
keys = default

[formatter_default]
format = %(asctime)s | %(levelname)-8s | %(name)s | %(filename)s:%(lineno)d | %(message)s
datefmt = %Y-%m-%d %H:%M:%S

[handlers]
keys = default

[handler_default]
class = StreamHandler
formatter = default
args = (sys.stderr,)

[loggers]
keys = root,uvicorn,uvicorn.error,uvicorn.access

[logger_root]
level = INFO
handlers = default
qualname =

[logger_uvicorn]
level = INFO
handlers = default
propagate = 0
qualname = uvicorn

[logger_uvicorn.error]
level = INFO
handlers = default
propagate = 0
qualname = uvicorn.error

[logger_uvicorn.access]
level = INFO
handlers = default
propagate = 0
qualname = uvicorn.access
